<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escala del Tiempo Geológico — GeoKnowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --brown-dark:#4A2E1A;--brown-mid:#7A5C3A;--brown-light:#9E7B56;
      --sand:#C4A46B;--cream:#FAF3E8;--cream-dark:#F0E4CC;
      --text-primary:#1A1208;--text-muted:#7A6A5A;
      --border:rgba(122,92,58,0.18);--white:#ffffff;
      /* Eon colors */
      --hadean:#2d1b4e;--archean:#1b3a4e;--proterozoic:#1b4e2d;
      --paleozoic:#4e3a1b;--mesozoic:#2d4e1b;--cenozoic:#4e2d1b;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Source Sans 3',sans-serif;background:var(--cream);color:var(--text-primary);overflow-x:hidden}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(250,243,232,0.93);backdrop-filter:blur(12px);border-bottom:.5px solid var(--border);padding:0 2.5rem;height:58px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:32px;height:32px;border-radius:8px;background:var(--brown-mid);display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:16px}
    .nav-logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text-primary)}
    .nav-logo-text span{color:var(--brown-light)}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{font-size:13px;color:var(--text-muted);text-decoration:none;transition:color .2s}
    .nav-links a.active{color:var(--text-primary);font-weight:600}
    .nav-cta{font-size:12px;font-weight:600;background:var(--brown-mid);color:var(--cream);padding:7px 18px;border-radius:99px;text-decoration:none}

    /* ── HERO ── */
    .page-hero{padding:7rem 2.5rem 3rem;background:var(--white);border-bottom:.5px solid var(--border);position:relative;overflow:hidden}
    .page-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 50% 80% at 95% 50%,rgba(196,164,107,0.14) 0%,transparent 65%),radial-gradient(ellipse 30% 50% at 0% 100%,rgba(122,92,58,0.08) 0%,transparent 60%)}
    .strata-top{position:absolute;top:0;left:0;right:0;height:6px;display:flex}
    .strata-top div{flex:1}
    .hero-content{position:relative;z-index:1;max-width:760px}
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);margin-bottom:1.25rem}
    .breadcrumb a{color:var(--brown-mid);text-decoration:none}
    .page-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--brown-mid);background:rgba(122,92,58,0.10);border:.5px solid rgba(122,92,58,0.25);padding:5px 12px;border-radius:99px;margin-bottom:1.25rem}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(30px,5vw,54px);font-weight:900;line-height:1.08;letter-spacing:-1.5px;margin-bottom:1rem}
    .page-title em{font-style:italic;color:var(--brown-light)}
    .page-lead{font-size:17px;font-weight:300;line-height:1.7;color:var(--text-muted);max-width:560px;margin-bottom:1.5rem}
    .hero-stats{display:flex;gap:2rem;flex-wrap:wrap}
    .hstat{display:flex;flex-direction:column;gap:2px}
    .hstat-num{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--brown-mid)}
    .hstat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}

    /* ── VIEW TOGGLE ── */
    .view-bar{padding:1.25rem 2.5rem;background:var(--cream-dark);border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .view-toggle{display:flex;gap:0;background:var(--white);border:.5px solid var(--border);border-radius:10px;overflow:hidden}
    .vbtn{font-size:12px;font-weight:600;padding:7px 16px;cursor:pointer;border:none;background:transparent;color:var(--text-muted);transition:all .15s;font-family:'Source Sans 3',sans-serif}
    .vbtn.active{background:var(--brown-mid);color:var(--cream)}
    .view-bar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
    .zoom-btn{width:32px;height:32px;border-radius:8px;border:.5px solid var(--border);background:var(--white);color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .zoom-btn:hover{background:var(--cream-dark);border-color:var(--brown-light)}
    .zoom-label{font-size:11px;color:var(--text-muted);font-family:'Space Mono',monospace;min-width:36px;text-align:center}

    /* ── MAIN ── */
    #view-timeline{display:block}
    #view-wheel{display:none}
    #view-list{display:none}

    /* ══ TIMELINE VIEW ══ */
    .timeline-wrap{overflow-x:auto;padding:2rem 2.5rem 3rem;background:var(--cream)}
    .timeline-container{min-width:1100px;position:relative}

    /* EON HEADER ROWS */
    .timeline-eon-row{display:flex;height:44px;margin-bottom:2px;border-radius:8px;overflow:hidden;position:relative}
    .eon-block{display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:.5px;cursor:default;transition:filter .2s;position:relative;overflow:hidden}
    .eon-block::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 100%)}

    .timeline-era-row{display:flex;height:36px;margin-bottom:2px}
    .era-block{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:.3px;cursor:pointer;transition:filter .18s;position:relative;overflow:hidden;margin-right:1px;border-radius:4px}
    .era-block:hover{filter:brightness(1.2)}

    .timeline-period-row{display:flex;height:52px;margin-bottom:3px}
    .period-block{display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:10px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;transition:all .18s;margin-right:1px;border-radius:6px;padding:4px 2px;text-align:center;line-height:1.2;position:relative;overflow:hidden}
    .period-block:hover{transform:scaleY(1.04);filter:brightness(1.18);z-index:2}
    .period-block.selected{outline:2px solid rgba(255,255,255,0.8);z-index:3;transform:scaleY(1.06)}
    .period-ma{font-size:8px;opacity:.65;font-family:'Space Mono',monospace;margin-top:2px}

    /* TIME AXIS */
    .time-axis{height:32px;position:relative;margin-top:4px}
    .axis-line{position:absolute;top:12px;left:0;right:0;height:.5px;background:var(--border)}
    .axis-tick{position:absolute;top:0;display:flex;flex-direction:column;align-items:center;gap:2px}
    .tick-line{width:.5px;height:12px;background:var(--text-muted);opacity:.4}
    .tick-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);white-space:nowrap}

    /* EVENTS TRACK */
    .events-track{position:relative;height:100px;margin-top:1rem}
    .events-track-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:.5rem}
    .event-dot{position:absolute;top:24px;width:10px;height:10px;border-radius:50%;cursor:pointer;transform:translateX(-50%);transition:transform .15s,box-shadow .15s;z-index:2}
    .event-dot:hover{transform:translateX(-50%) scale(1.5);box-shadow:0 0 0 4px rgba(255,255,255,0.3)}
    .event-line{position:absolute;top:29px;width:.5px;background:var(--text-muted);opacity:.3}
    .event-label{position:absolute;font-size:9px;color:var(--text-muted);white-space:nowrap;line-height:1.2;pointer-events:none}

    /* LIFE TRACK */
    .life-track{position:relative;margin-top:.5rem;height:80px}
    .life-track-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:.5rem}
    .life-bar{position:absolute;height:18px;border-radius:9px;opacity:.75;top:20px;cursor:pointer;transition:opacity .15s,transform .15s}
    .life-bar:hover{opacity:1;transform:scaleY(1.2)}
    .life-bar-label{position:absolute;font-size:9px;color:var(--text-muted);top:42px;white-space:nowrap;transform:translateX(-50%)}

    /* ── DETAIL PANEL ── */
    .detail-panel{background:var(--white);border-top:.5px solid var(--border);padding:0}
    .detail-inner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;max-width:1600px;margin:0 auto}
    .detail-closed{display:flex;align-items:center;justify-content:center;padding:1.25rem;font-size:13px;color:var(--text-muted);border-bottom:.5px solid var(--border);gap:.5rem;cursor:default}
    .detail-section{padding:2rem 2.5rem;border-right:.5px solid var(--border)}
    .detail-section:last-child{border-right:none}
    .ds-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:.75rem}
    .ds-period-name{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:var(--text-primary);letter-spacing:-.5px;margin-bottom:.25rem}
    .ds-period-ma{font-family:'Space Mono',monospace;font-size:14px;color:var(--brown-mid);margin-bottom:1rem}
    .ds-desc{font-size:14px;line-height:1.75;color:var(--text-primary)}
    .ds-props{display:flex;flex-direction:column;gap:.75rem}
    .ds-prop{display:flex;flex-direction:column;gap:3px}
    .ds-prop-key{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
    .ds-prop-val{font-size:13px;color:var(--text-primary);line-height:1.5}
    .ds-events{display:flex;flex-direction:column;gap:.6rem}
    .ds-event{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .75rem;border-radius:10px;font-size:13px}
    .ds-event-icon{font-size:16px;flex-shrink:0;margin-top:1px}
    .ds-event-text{line-height:1.5;color:var(--text-primary)}

    /* ══ WHEEL VIEW ══ */
    .wheel-wrap{padding:2.5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
    #wheel-canvas{max-width:700px;width:100%;cursor:pointer;border-radius:50%;box-shadow:0 20px 80px rgba(74,46,26,0.18)}
    .wheel-legend{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;max-width:700px}
    .wleg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted)}
    .wleg-dot{width:10px;height:10px;border-radius:50%}
    .wheel-info{max-width:600px;width:100%;background:var(--white);border:.5px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center}
    .wheel-info-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--text-primary);margin-bottom:.25rem}
    .wheel-info-ma{font-family:'Space Mono',monospace;font-size:13px;color:var(--brown-mid)}
    .wheel-info-desc{font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:.75rem}

    /* ══ LIST VIEW ══ */
    .list-wrap{padding:2rem 2.5rem;max-width:1000px;margin:0 auto}
    .list-eon{margin-bottom:3rem}
    .list-eon-header{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;padding:1rem 1.5rem;border-radius:12px}
    .list-eon-name{font-family:'Playfair Display',serif;font-size:22
